<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bebidas San Martin - Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login-body">
  <form class="login-panel" method="post">
    <div class="login-brand">
      <div class="logo-mark">BSM</div>
      <div>
        <h1>Bebidas San Martin</h1>
        <p>Sistema de gestion</p>
      </div>
    </div>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <label>Usuario<input name="usuario" required autocomplete="username"></label>
    <label>Contrasena<input name="password" type="password" required autocomplete="current-password"></label>
    <button>Entrar</button>
  </form>
</body>
</html>
